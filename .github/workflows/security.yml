name: Security Scan

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (gives CodeQL full TypeScript type information)
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'public,node_modules/.cache'

      - name: Upload Trivy filesystem results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs-scan'

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [frontend, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/${{ matrix.image }}.Dockerfile
          push: false
          load: true
          tags: nexus-vtt/${{ matrix.image }}:scan

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: nexus-vtt/${{ matrix.image }}:scan
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-${{ matrix.image }}.sarif') != ''
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'
          category: 'trivy-container-${{ matrix.image }}'

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v7
        with:
          image: nexus-vtt/${{ matrix.image }}:scan
          fail-build: false
          severity-cutoff: high

  sbom:
    name: Generate CycloneDX SBOMs
    runs-on: ubuntu-latest
    # SBOMs are generated on every master push and on releases.
    # To consume them for vulnerability tracking, upload to Dependency-Track
    # (https://dependencytrack.org) — it ingests CycloneDX JSON natively and
    # shows a dashboard of CVEs over time per project component.
    permissions:
      contents: write   # needed to attach SBOMs to GitHub releases
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Filesystem SBOM (npm dependencies) ──────────────────────────────
      - name: Generate filesystem SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-filesystem.cdx.json'
          skip-dirs: 'public,node_modules/.cache'

      - name: Upload filesystem SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-filesystem-${{ github.sha }}
          path: sbom-filesystem.cdx.json
          retention-days: 90

      # ── Container SBOMs (OS packages + app deps inside each image) ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend image for SBOM
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: production
          push: false
          load: true
          tags: nexus-vtt/frontend:sbom

      - name: Build backend image for SBOM
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/backend.Dockerfile
          push: false
          load: true
          tags: nexus-vtt/backend:sbom

      - name: Generate frontend container SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: 'nexus-vtt/frontend:sbom'
          format: 'cyclonedx'
          output: 'sbom-frontend.cdx.json'

      - name: Generate backend container SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: 'nexus-vtt/backend:sbom'
          format: 'cyclonedx'
          output: 'sbom-backend.cdx.json'

      - name: Upload container SBOMs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-containers-${{ github.sha }}
          path: |
            sbom-frontend.cdx.json
            sbom-backend.cdx.json
          retention-days: 90

      # ── Attach SBOMs to GitHub release (versioned audit trail) ───────────
      - name: Attach SBOMs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-filesystem.cdx.json
            sbom-frontend.cdx.json
            sbom-backend.cdx.json
