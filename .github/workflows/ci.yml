name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '26.5.0'

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Check import cycles
        run: npm run check:cycles

      - name: Verify dice assets
        run: npm run check:dice-assets

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --shard=${{ matrix.shard }}/3
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=4096

  asset-service-tests:
    name: Asset Service Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run asset service tests
        run: npm run test:asset-service

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run integration tests with Docker Compose
        run: docker compose -f docker/docker-compose.test.yml up --build --abort-on-container-exit

  e2e-smoke:
    name: Production E2E Smoke
    runs-on: ubuntu-latest
    needs: lint-and-type
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-smoke-report
          path: |
            playwright-report/
            test-results/e2e/
          if-no-files-found: ignore
          retention-days: 14
