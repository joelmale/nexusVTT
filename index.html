<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/nexus-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus VTT - Virtual Tabletop</title>
    <meta name="description" content="A lightweight, modern virtual tabletop for browser-based RPG sessions" />

    <!-- Google Fonts: Thematic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <!-- Preload Critical LCP Background Image -->
    <link rel="preload" as="image" href="/src/assets/DnDTeamPosing.webp" fetchpriority="high" type="image/webp" />

    <!-- Theme Pre-warming Script (Prevents flash of unstyled content / layout shift) -->
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('nexus-theme') || 'solid';
          if (theme === 'solid') {
            document.documentElement.classList.add('theme-solid', 'solid-theme');
          }
        } catch (e) {}
      })();
    </script>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="/assets/icons/nexus-icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexus VTT - Virtual Tabletop" />
    <meta property="og:description" content="A lightweight, modern virtual tabletop for browser-based RPG sessions" />
    <meta property="og:url" content="https://nexus-vtt.app" />
    <meta property="og:image" content="/assets/images/og-image.png" />
  </head>
  <body>
    <div id="root">
      <!-- Static Loading Skeleton (Renders instantly while JS bundle loads) -->
      <div class="welcome-page">
        <div class="welcome-background">
          <div class="background-overlay"></div>
        </div>
        <div class="welcome-content">
          <div class="welcome-panel glass-panel">
            <!-- Brand Logo - Upper Left -->
            <div class="brand-logo-left">
              <span class="brand-logo-icon">🎲</span>
            </div>

            <div class="brand-section">
              <div class="brand-logo">
                <h1 class="brand-title">Nexus VTT</h1>
              </div>
              <p class="brand-tagline">Your gateway to epic adventures</p>
            </div>
            <div style="height: 200px; display: flex; align-items: center; justify-content: center;">
              <div class="loading-spinner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="portal-root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
