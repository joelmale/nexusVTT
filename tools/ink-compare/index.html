<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #222; color: #fff; }
    .container { display: flex; gap: 20px; margin-top: 20px; }
    .view { border: 1px solid #444; background: #000; position: relative; }
    .diff-view { position: relative; width: 400px; height: 400px; border: 1px solid #444; background: #000; margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Ink Compare Harness</h2>
  <div class="container">
    <div>
      <h3>SVG (Legacy)</h3>
      <div id="svg-container" class="view" style="width: 400px; height: 400px;">
        <svg id="svg" width="400" height="400" style="width: 100%; height: 100%;"></svg>
      </div>
    </div>
    <div>
      <h3>Canvas 2D (New)</h3>
      <div id="canvas-container" class="view" style="width: 400px; height: 400px;">
        <canvas id="canvas" width="400" height="400"></canvas>
      </div>
    </div>
  </div>
  
  <div>
    <h3>Diff Output (Tolerance: <span id="diff-pct"></span>%)</h3>
    <canvas id="diff-canvas" width="400" height="400" style="border: 1px solid #444;"></canvas>
  </div>
  
  <p id="result" style="font-size: 24px; font-weight: bold;"></p>

  <script>
    // Test drawing
    const points = Array.from({length: 50}, (_, i) => ({
      x: 50 + i * 6 + Math.sin(i * 0.5) * 30,
      y: 200 + Math.cos(i * 0.3) * 100
    }));

    const strokeWidth = 10;
    const strokeColor = "#00bcd4";

    // 1. Render SVG
    const svg = document.getElementById('svg');
    const pathData = `M ${points.map(p => `${p.x} ${p.y}`).join(' L ')}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', pathData);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', strokeColor);
    path.setAttribute('stroke-width', strokeWidth);
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(path);

    // 2. Render Canvas
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = strokeWidth;
    ctx.strokeStyle = strokeColor;
    ctx.stroke();

    // 3. Diff
    async function runDiff() {
      // Get SVG image data by serializing and drawing to a hidden canvas
      const svgData = new XMLSerializer().serializeToString(svg);
      const img = new Image();
      const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(svgBlob);
      
      await new Promise(resolve => {
        img.onload = resolve;
        img.src = url;
      });

      const hiddenCanvas = document.createElement('canvas');
      hiddenCanvas.width = 400;
      hiddenCanvas.height = 400;
      const hctx = hiddenCanvas.getContext('2d');
      hctx.drawImage(img, 0, 0);

      const svgImgData = hctx.getImageData(0, 0, 400, 400).data;
      const canvasImgData = ctx.getImageData(0, 0, 400, 400).data;

      const diffCanvas = document.getElementById('diff-canvas');
      const diffCtx = diffCanvas.getContext('2d');
      const diffImg = diffCtx.createImageData(400, 400);

      let diffPixels = 0;
      const totalPixels = 400 * 400;

      for (let i = 0; i < svgImgData.length; i += 4) {
        const r1 = svgImgData[i], g1 = svgImgData[i+1], b1 = svgImgData[i+2], a1 = svgImgData[i+3];
        const r2 = canvasImgData[i], g2 = canvasImgData[i+1], b2 = canvasImgData[i+2], a2 = canvasImgData[i+3];

        // Anti-aliasing differences can cause slight variations. Tolerate minor differences.
        const diff = Math.abs(r1 - r2) + Math.abs(g1 - g2) + Math.abs(b1 - b2) + Math.abs(a1 - a2);
        
        if (diff > 50) { // Tolerance for AA
          diffPixels++;
          diffImg.data[i] = 255;
          diffImg.data[i+1] = 0;
          diffImg.data[i+2] = 0;
          diffImg.data[i+3] = 255;
        } else {
          // Fade identical pixels
          diffImg.data[i] = r1;
          diffImg.data[i+1] = g1;
          diffImg.data[i+2] = b1;
          diffImg.data[i+3] = a1 * 0.2;
        }
      }

      diffCtx.putImageData(diffImg, 0, 0);
      
      const pct = (diffPixels / totalPixels) * 100;
      document.getElementById('diff-pct').textContent = pct.toFixed(3);
      
      const resultEl = document.getElementById('result');
      if (pct < 1) {
        resultEl.textContent = "PASS: Visual parity is < 1%";
        resultEl.style.color = "#4CAF50";
      } else {
        resultEl.textContent = "FAIL: Visual parity is > 1%";
        resultEl.style.color = "#F44336";
      }
    }

    runDiff();
  </script>
</body>
</html>
