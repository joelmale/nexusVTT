services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    ports:
      - '${SOAK_TOXIPROXY_PORT:-18474}:8474'
    healthcheck:
      test: ['CMD', '/toxiproxy-cli', '-host=127.0.0.1:8474', 'list']
      interval: 2s
      timeout: 5s
      retries: 30

  backend:
    depends_on:
      toxiproxy:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nexus_smoke:nexus_smoke_password@toxiproxy:15432/nexus_smoke

  backend-peer:
    depends_on:
      toxiproxy:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nexus_smoke:nexus_smoke_password@toxiproxy:15432/nexus_smoke
