services:
  postgres:
    image: ${IMAGE_PREFIX:-ghcr.io/joelmale/nexusvtt}/postgres:${VERSION:-latest}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexus-internal
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nexus}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - nexus-internal
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ${IMAGE_PREFIX:-ghcr.io/joelmale/nexusvtt}/backend:${VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_CALLBACK_URL: ${DISCORD_CALLBACK_URL}
    volumes:
      - nexus-assets:/app/static-assets/assets
    networks:
      - nexus-internal
    restart: unless-stopped

  frontend:
    image: ${IMAGE_PREFIX:-ghcr.io/joelmale/nexusvtt}/frontend:${VERSION:-latest}
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    volumes:
      - nexus-assets:/usr/share/nginx/html/assets:ro
    networks:
      - nexus-internal
      - proxy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  nexus-assets:

networks:
  # Internal network — only containers in this stack can communicate on it
  nexus-internal:

  # External network shared with your reverse proxy (Nginx Proxy Manager, Traefik, etc.)
  # Set PROXY_NETWORK in your .env to match your reverse proxy's network name.
  proxy:
    external: true
    name: ${PROXY_NETWORK:-homelab-net}
