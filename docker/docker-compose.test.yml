# Test Docker Compose configuration
# Run tests with: docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit

services:
  test:
    image: node:26.5.0-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run test:integration"
    volumes:
      - ../:/app
      - /app/node_modules
    environment:
      - NODE_ENV=test
      - CI=true
      - DATABASE_URL=postgres://testuser:testpass@postgres-test:5432/testdb
      - JWT_SECRET=test-secret
    networks:
      - nexus-test
    depends_on:
      postgres-test:
        condition: service_healthy

  postgres-test:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=testuser
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_DB=testdb
    networks:
      - nexus-test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d testdb']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432:5432'

networks:
  nexus-test:
    driver: bridge
