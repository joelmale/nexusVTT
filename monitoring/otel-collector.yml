receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: nexus-vtt-backend
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets: ['backend:5001']

processors:
  batch: {}
  memory_limiter:
    check_interval: 5s
    limit_mib: 256

exporters:
  otlp:
    endpoint: ${env:OTEL_EXPORTER_OTLP_ENDPOINT}
    tls:
      insecure: false

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, batch]
      exporters: [otlp]
